<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }

    .navmenu {
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .navmenu ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 20px;
    }

    .navmenu ul li a {
      text-decoration: none;
      color: #495057;
      font-weight: 600;
    }

    .navmenu ul li a.active {
      color: #0d6efd;
    }

    .alert-container {
      margin-bottom: 20px;
    }

    .user-table {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }

    .table thead {
      background-color: #f1f3f5;
    }

    form input, form button {
      margin-bottom: 10px;
      padding: 10px;
      width: 100%;
      max-width: 500px;
    }

    form button {
      background-color: #0d6efd;
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    form button:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>

<body>

<!-- Nav Menu -->
<nav id="navmenu" class="navmenu container d-flex justify-content-between align-items-center">
  <ul class="mb-0">
    <li><a href="{% url 'adminhome' %}" class="active">Registered Users</a></li>
    <li><a href="{% url 'customer_lists' %}" class="active">Applications</a></li>
    <li><a href="{% url 'predict_loan' %}" class="active">Ai</a></li>
    <li><a href="{% url 'user_logout' %}" class="active">Logout</a></li>
  </ul>
  <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
</nav>

<!-- Loan Prediction Form Section -->
<section class="section py-4">
  <div class="container">
    <!-- Flash Messages -->
    {% if messages %}
      <div class="alert-container">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <div class="user-table">
      <h2 class="mb-4">Loan Approval Prediction</h2>
      <form method="post">
        {% csrf_token %}
        <input type="number" name="person_age" placeholder="Age" required>
        <input type="text" name="person_gender" placeholder="Gender" required>
        <input type="text" name="person_education" placeholder="Education" required>
        <input type="number" name="person_income" placeholder="Income" required>
        <input type="number" name="person_emp_exp" placeholder="Employment Experience" required>
        <input type="text" name="person_home_ownership" placeholder="Home Ownership" required>
        <input type="number" name="loan_amnt" placeholder="Loan Amount" required>
        <input type="text" name="loan_intent" placeholder="Loan Intent" required>
        <input type="number" step="0.01" name="loan_int_rate" placeholder="Interest Rate" required>
        <input type="number" step="0.01" name="loan_percent_income" placeholder="Loan % of Income" required>
        <input type="number" name="cb_person_cred_hist_length" placeholder="Credit History Length" required>
        <input type="number" name="credit_score" placeholder="Credit Score" required>
        <input type="text" name="previous_loan_defaults_on_file" placeholder="Previous Default (Yes/No)" required>
        <button type="submit">Predict</button>
      </form>

      {% if prediction %}
        <p class="mt-3"><strong>Prediction:</strong> {{ prediction }}</p>
      {% endif %}
    </div>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
